<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#0F2D1A"/>

  <!-- Subtle grid texture -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- Top nav bar -->
  <rect x="0" y="0" width="800" height="52" fill="#0A2010"/>
  <text x="32" y="32" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#4ADE80">⛳ FairwayGo</text>
  <rect x="660" y="16" width="108" height="24" rx="12" fill="#16A34A"/>
  <text x="714" y="33" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Ny rond</text>

  <!-- Scorecard container -->
  <rect x="32" y="72" width="460" height="300" rx="16" fill="#142E1A" stroke="#1F4D2A" stroke-width="1"/>

  <!-- Scorecard header -->
  <rect x="32" y="72" width="460" height="44" rx="16" fill="#16A34A"/>
  <rect x="32" y="96" width="460" height="20" fill="#16A34A"/>
  <text x="56" y="99" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff">Hål</text>
  <text x="180" y="99" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Par</text>
  <text x="280" y="99" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Handicap</text>
  <text x="390" y="99" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Slag</text>
  <text x="460" y="99" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">+/-</text>

  <!-- Rows -->
  <!-- Row 1 -->
  <rect x="32" y="116" width="460" height="36" fill="#1A3D22"/>
  <text x="56" y="139" font-family="system-ui,sans-serif" font-size="13" fill="#e2e8f0">1</text>
  <text x="180" y="139" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">4</text>
  <text x="280" y="139" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">7</text>
  <rect x="368" y="123" width="44" height="24" rx="12" fill="#16A34A"/>
  <text x="390" y="139" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <text x="460" y="139" font-family="system-ui,sans-serif" font-size="12" fill="#4ADE80" text-anchor="middle">E</text>

  <!-- Row 2 -->
  <rect x="32" y="152" width="460" height="36" fill="#142E1A"/>
  <text x="56" y="175" font-family="system-ui,sans-serif" font-size="13" fill="#e2e8f0">2</text>
  <text x="180" y="175" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">3</text>
  <text x="280" y="175" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">15</text>
  <rect x="368" y="159" width="44" height="24" rx="12" fill="#15803D"/>
  <text x="390" y="175" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="460" y="175" font-family="system-ui,sans-serif" font-size="12" fill="#4ADE80" text-anchor="middle">-1</text>

  <!-- Row 3 -->
  <rect x="32" y="188" width="460" height="36" fill="#1A3D22"/>
  <text x="56" y="211" font-family="system-ui,sans-serif" font-size="13" fill="#e2e8f0">3</text>
  <text x="180" y="211" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">5</text>
  <text x="280" y="211" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">3</text>
  <rect x="368" y="195" width="44" height="24" rx="12" fill="#DC2626"/>
  <text x="390" y="211" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">6</text>
  <text x="460" y="211" font-family="system-ui,sans-serif" font-size="12" fill="#f87171" text-anchor="middle">+1</text>

  <!-- Row 4 -->
  <rect x="32" y="224" width="460" height="36" fill="#142E1A"/>
  <text x="56" y="247" font-family="system-ui,sans-serif" font-size="13" fill="#e2e8f0">4</text>
  <text x="180" y="247" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">4</text>
  <text x="280" y="247" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">11</text>
  <rect x="368" y="231" width="44" height="24" rx="12" fill="#16A34A"/>
  <text x="390" y="247" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <text x="460" y="247" font-family="system-ui,sans-serif" font-size="12" fill="#4ADE80" text-anchor="middle">E</text>

  <!-- Row 5 -->
  <rect x="32" y="260" width="460" height="36" fill="#1A3D22"/>
  <text x="56" y="283" font-family="system-ui,sans-serif" font-size="13" fill="#e2e8f0">5</text>
  <text x="180" y="283" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">4</text>
  <text x="280" y="283" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">5</text>
  <text x="390" y="283" font-family="system-ui,sans-serif" font-size="13" fill="#475569" text-anchor="middle">—</text>
  <text x="460" y="283" font-family="system-ui,sans-serif" font-size="12" fill="#475569" text-anchor="middle">—</text>

  <!-- Totals row -->
  <rect x="32" y="296" width="460" height="44" rx="0" fill="#0A2010"/>
  <rect x="32" y="316" width="460" height="24" rx="0" fill="#0A2010"/>
  <text x="56" y="322" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#94a3b8">TOTAL (9 hål)</text>
  <text x="180" y="322" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">36</text>
  <text x="390" y="322" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#4ADE80" text-anchor="middle">38</text>
  <text x="460" y="322" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#4ADE80" text-anchor="middle">+2</text>

  <!-- Right panel: stats -->
  <rect x="512" y="72" width="256" height="140" rx="16" fill="#142E1A" stroke="#1F4D2A" stroke-width="1"/>
  <text x="536" y="100" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#4ADE80" letter-spacing="1">DAGENS ROND</text>
  <text x="536" y="132" font-family="system-ui,sans-serif" font-size="42" font-weight="700" fill="#fff">+2</text>
  <text x="608" y="132" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8">vs par</text>
  <line x1="536" y1="148" x2="748" y2="148" stroke="#1F4D2A" stroke-width="1"/>
  <text x="536" y="170" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Bäst hål</text>
  <text x="748" y="170" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#4ADE80" text-anchor="end">Hål 2 (-1)</text>
  <text x="536" y="192" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8">Handicapindex</text>
  <text x="748" y="192" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#e2e8f0" text-anchor="end">18.4</text>

  <!-- Course map placeholder -->
  <rect x="512" y="228" width="256" height="144" rx="16" fill="#142E1A" stroke="#1F4D2A" stroke-width="1"/>
  <text x="536" y="256" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#4ADE80" letter-spacing="1">BANÖVERSIKT</text>
  <!-- Stylized course map -->
  <ellipse cx="640" cy="306" rx="80" ry="44" fill="#16502A" stroke="#22863A" stroke-width="1.5"/>
  <ellipse cx="640" cy="306" rx="52" ry="28" fill="#1A6332" stroke="none"/>
  <!-- Fairway -->
  <path d="M 580 290 Q 620 270 660 290 Q 680 300 680 316 Q 660 330 620 326 Q 595 320 580 306 Z" fill="#15803D" opacity="0.6"/>
  <!-- Green -->
  <ellipse cx="668" cy="310" rx="18" ry="12" fill="#4ADE80" opacity="0.8"/>
  <!-- Flag -->
  <line x1="668" y1="298" x2="668" y2="282" stroke="#fff" stroke-width="1.5"/>
  <polygon points="668,282 680,288 668,294" fill="#ef4444"/>
  <!-- Tee -->
  <circle cx="588" cy="300" r="5" fill="#fbbf24"/>
  <!-- Sand bunker -->
  <ellipse cx="650" cy="324" rx="10" ry="6" fill="#d97706" opacity="0.5"/>

  <!-- Bottom bar -->
  <rect x="0" y="364" width="800" height="36" fill="#0A2010"/>
  <text x="400" y="387" font-family="system-ui,sans-serif" font-size="11" fill="#4ADE80" text-anchor="middle" font-weight="500">● Live · 5 spelare på banan · Uppdateras i realtid</text>
</svg>
