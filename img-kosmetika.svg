<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#FDF8F5"/>

  <!-- Nav -->
  <rect x="0" y="0" width="800" height="52" fill="#fff" stroke="#F0EAE4" stroke-width="1"/>
  <text x="40" y="32" font-family="Georgia,serif" font-size="17" font-weight="700" fill="#1a1a1a" letter-spacing="3">LUMIÈRE</text>
  <text x="340" y="32" font-family="system-ui,sans-serif" font-size="12" fill="#888" text-anchor="middle">Produkter</text>
  <text x="430" y="32" font-family="system-ui,sans-serif" font-size="12" fill="#888" text-anchor="middle">Om oss</text>
  <text x="510" y="32" font-family="system-ui,sans-serif" font-size="12" fill="#888" text-anchor="middle">Ingredienser</text>
  <rect x="668" y="14" width="96" height="28" rx="14" fill="#1a1a1a"/>
  <text x="716" y="33" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">Handla nu</text>

  <!-- Hero: left text -->
  <text x="40" y="104" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#C4956A" letter-spacing="2">NY KOLLEKTION</text>

  <text x="40" y="140" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#1a1a1a">Din hud.</text>
  <text x="40" y="180" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#1a1a1a">Din ritual.</text>

  <text x="40" y="214" font-family="system-ui,sans-serif" font-size="13" fill="#888" width="260">Naturliga ingredienser, vetenskapligt</text>
  <text x="40" y="232" font-family="system-ui,sans-serif" font-size="13" fill="#888">framtagna för din hudtyp.</text>

  <!-- CTA buttons -->
  <rect x="40" y="252" width="140" height="40" rx="20" fill="#1a1a1a"/>
  <text x="110" y="277" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Utforska →</text>
  <rect x="196" y="252" width="140" height="40" rx="20" fill="none" stroke="#d4bfb0" stroke-width="1.5"/>
  <text x="266" y="277" font-family="system-ui,sans-serif" font-size="12" fill="#888" text-anchor="middle">Läs mer</text>

  <!-- Trust badges -->
  <text x="40" y="324" font-family="system-ui,sans-serif" font-size="10" fill="#bbb">✦ Veganskt &nbsp;&nbsp; ✦ Cruelty-free &nbsp;&nbsp; ✦ Naturliga ingredienser</text>

  <!-- Hero: product image area -->
  <rect x="380" y="56" width="380" height="320" fill="#F5EDE6"/>

  <!-- Product: large circle (jar/bottle) -->
  <ellipse cx="570" cy="230" rx="110" ry="110" fill="#E8D5C4"/>
  <ellipse cx="570" cy="230" rx="90" ry="90" fill="#D4B896"/>
  <ellipse cx="570" cy="230" rx="72" ry="72" fill="#C4956A"/>
  <ellipse cx="570" cy="230" rx="56" ry="56" fill="#B8845A"/>

  <!-- Jar lid -->
  <ellipse cx="570" cy="140" rx="52" ry="16" fill="#E8D5C4"/>
  <rect x="518" y="140" width="104" height="24" fill="#DEC8B0"/>
  <ellipse cx="570" cy="164" rx="52" ry="16" fill="#D4B896"/>

  <!-- Jar label -->
  <ellipse cx="570" cy="242" rx="44" ry="44" fill="#fff" opacity="0.9"/>
  <text x="570" y="234" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">LUMIÈRE</text>
  <text x="570" y="250" font-family="system-ui,sans-serif" font-size="8" fill="#888" text-anchor="middle">SERUM · 30ml</text>
  <text x="570" y="264" font-family="system-ui,sans-serif" font-size="8" fill="#C4956A" text-anchor="middle">★★★★★</text>

  <!-- Decorative small elements -->
  <circle cx="680" cy="120" r="28" fill="#E8D5C4" opacity="0.6"/>
  <circle cx="700" cy="148" r="16" fill="#D4B896" opacity="0.5"/>
  <circle cx="440" cy="320" r="20" fill="#E8D5C4" opacity="0.5"/>
  <circle cx="460" cy="344" r="10" fill="#D4B896" opacity="0.4"/>

  <!-- Botanical sprig -->
  <line x1="448" y1="108" x2="448" y2="160" stroke="#9CAF88" stroke-width="1.5"/>
  <ellipse cx="440" cy="120" rx="10" ry="6" fill="#9CAF88" opacity="0.7" transform="rotate(-30 440 120)"/>
  <ellipse cx="456" cy="132" rx="10" ry="6" fill="#9CAF88" opacity="0.7" transform="rotate(20 456 132)"/>
  <ellipse cx="442" cy="148" rx="10" ry="6" fill="#9CAF88" opacity="0.7" transform="rotate(-20 442 148)"/>

  <!-- Price tag -->
  <rect x="500" y="326" width="140" height="40" rx="12" fill="#fff" stroke="#F0EAE4" stroke-width="1"/>
  <text x="526" y="352" font-family="Georgia,serif" font-size="18" font-weight="700" fill="#1a1a1a">349 kr</text>
  <text x="652" y="352" font-family="system-ui,sans-serif" font-size="10" fill="#bbb" text-anchor="end">inkl. moms</text>
</svg>
